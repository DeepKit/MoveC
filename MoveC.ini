[Migration]
CreateBackupByDefault=1
VerifyFilesAfterCopy=1
UseMultiThreading=1
MaxConcurrentOperations=4
BufferSize=1024
[Cleanup]
AutoCleanupTemp=0
AutoCleanupRecycleBin=0
KeepRecentBackups=1
BackupRetentionDays=30
[Logging]
LogLevel=1
EnableFileLogging=1
LogRotationSize=10
MaxLogFiles=5
[Security]
RequireConfirmation=1
RestrictedModeEnabled=0
AllowSystemDirectories=0
[Interface]
WindowStyle=Modern
UseModernColors=1
ShowDetailedProgress=1
AutoRefreshInterval=5
[Performance]
EnableSystemMonitoring=1
PerformanceOptimization=1
MemoryUsageLimit=512
